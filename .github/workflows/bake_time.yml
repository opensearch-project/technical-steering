name: Bake time

on:
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:
  schedule:
    - cron: "0 */1 * * *" # Runs every 1 hour

jobs:
  baking_pull_request:
    name: "Baking pull request..."
    runs-on: ubuntu-latest
    steps:
      - uses: peternied/bake-time@9b5f238efbc819d822ad770c7cf9b90ebbffa450 # v3.3
        with:
          check-name: "Baking pull request..."
          delay-hours: 48
